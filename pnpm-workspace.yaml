# protobufjs/sharp build scripts intentionally not allowed — optional
# transformers.js extras this project never uses at runtime.
allowBuilds:
  better-sqlite3: true
  onnxruntime-node: true
  protobufjs: false
  sharp: false
# pnpm 10 compatibility (pnpm 11 uses allowBuilds above)
onlyBuiltDependencies:
  - better-sqlite3
  - onnxruntime-node
